version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: market-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market
    ports:
      - "5432:5432"
    volumes:
      - market-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: market-redis
    ports:
      - "6379:6379"
    volumes:
      - market-redis-data:/data

volumes:
  market-postgres-data:
  market-redis-data:
