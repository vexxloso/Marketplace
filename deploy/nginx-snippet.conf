# Copy to: /etc/nginx/snippets/marketplace-locations.conf
# Include INSIDE every server { listen 80; ... } that serves the marketplace, e.g.:
#   include /etc/nginx/snippets/marketplace-locations.conf;
#
# IMPORTANT for “IP only” access (http://213.x.x.x/market):
#   You must include this in the same server block that handles that IP — usually
#   /etc/nginx/sites-enabled/default (default_server), NOT only in a server_name
#   that matches your lottery domain. Otherwise /market may hit the wrong site.
#
# After changing apps/web/next.config.ts basePath, always on the VPS:
#   rm -rf apps/web/.next && pnpm --filter @market/web build && pm2 restart market-web
#
# proxy_pass has NO URI path so Next receives /market, /market/, /market/_next/… as-is.

location = /market {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location ^~ /market/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location /market-api/ {
    rewrite ^/market-api/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
