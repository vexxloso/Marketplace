# Copy to the VPS, then include once inside your existing port-80 server { } block:
#
#   sudo cp deploy/nginx-snippet.conf /etc/nginx/snippets/marketplace-locations.conf
#   sudo nano /etc/nginx/sites-enabled/default
#   Add this line inside server { listen 80 ... }:
#     include /etc/nginx/snippets/marketplace-locations.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# On the VPS, set:
#   apps/web/.env.production → NEXT_PUBLIC_API_URL=http://YOUR_IP_OR_DOMAIN/market-api
#   apps/api/.env  → APP_URL=http://YOUR_IP_OR_DOMAIN
# Rebuild web: pnpm --filter @market/web build && pm2 restart market-web market-api

location /market/ {
    proxy_pass http://127.0.0.1:3001/market/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location /market-api/ {
    rewrite ^/market-api/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
